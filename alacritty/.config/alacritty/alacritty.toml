[general]
import = ["~/.config/alacritty/themes/tokyo_night.toml"]

[env]
TERM = "xterm-256color"

[window]
title = "Alacritty"
dynamic_title = true
decorations = "Full"       # "Full" | "None" | "Transparent" | "Buttonless"
option_as_alt = "Both"     # "OnlyLeft" | "OnlyRight" | "Both" | "None" # (macOS only)
opacity = 1
blur = false
startup_mode = "Maximized" # "Windowed" | "Maximized" | "Fullscreen" | "SimpleFullscreen"(macOS only)

[font]
#normal = { family = "CaskaydiaCove Nerd Font", style = "Regular" }
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 11.0
builtin_box_drawing = true

[cursor]
style = { shape = "Underline", blinking = "Always" }
blink_interval = 500

[mouse]
hide_when_typing = true
